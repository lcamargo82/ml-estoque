version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-nest_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml_network

  prometheus:
    image: prom/prometheus:latest
    container_name: nest_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - ml_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: nest_api
    restart: always
    ports:
      - "3000:3000"
      - "9464:9464"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USERNAME:-user}
      DATABASE_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_NAME: ${DB_DATABASE:-nest_db}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      PORT: 3000
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - ml_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nest_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  postgres_data: