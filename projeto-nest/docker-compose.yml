version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nest_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml_network

  prometheus:
    build: 
      context: .
      dockerfile: Dockerfile.prometheus
    container_name: nest_prometheus
    restart: always
    ports:
      - "9090:9090"
    networks:
      - ml_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: development
    container_name: nest_api
    restart: always
    ports:
      - "3000:3000"
      - "9464:9464"
    env_file:
      - .env
    networks:
      - ml_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nest_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ml_network

networks:
  ml_network:
    driver: bridge

volumes:
  postgres_data:
  